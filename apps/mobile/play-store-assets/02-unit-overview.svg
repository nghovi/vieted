          <text x="104" y="630" fill="#163127" font-size="34" font-weight="700" font-family="Georgia, 'Times New Roman', serif">4 ý chính • 3 bộ luyện • 1 bộ chốt cấp độ</text>
          <text x="104" y="690" fill="#5d6f68" font-size="28" font-weight="500" font-family="Georgia, 'Times New Roman', serif">Tiếp tục học theo từng bước, rồi sang kiểm tra để biết mình còn yếu ở đâu.</text>
        
        
    <rect x="88" y="856" width="240" height="92" rx="30" fill="#db6b2d" stroke="none" stroke-width="2"/>

        <text x="88" y="210" fill="#163127" font-size="72" font-weight="600" font-family="Georgia, 'Times New Roman', serif"><tspan x="88" dy="0">Unit 2. City</tspan><tspan x="88" dy="97.2">Life</tspan></text>
        <text x="88" y="360" fill="#5d6f68" font-size="34" font-weight="500" font-family="Georgia, 'Times New Roman', serif">Học từ vựng, so sánh, giao thông và cách nói về ưu nhược điểm của cuộc sống thành phố.</text>

        <text x="88" y="210" fill="#163127" font-size="64" font-weight="600" font-family="Georgia, 'Times New Roman', serif"><tspan x="88" dy="0">Ôn lại đúng kỹ</tspan><tspan x="88" dy="86.4">năng đến hạn để</tspan><tspan x="88" dy="86.4">nhớ chắc hơn mỗi</tspan><tspan x="88" dy="86.4">ngày.</tspan></text>
